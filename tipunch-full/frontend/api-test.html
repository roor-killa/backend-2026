<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ti Punch Master</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f4ef;
      --panel: #ffffff;
      --panel-strong: #24352f;
      --text: #1e2524;
      --muted: #6a716f;
      --line: #dcd7cc;
      --accent: #1d8f73;
      --accent-2: #d36a2d;
      --danger: #b33b34;
      --shadow: 0 14px 34px rgba(36, 53, 47, 0.11);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(29, 143, 115, 0.08), transparent 42%),
        linear-gradient(315deg, rgba(211, 106, 45, 0.09), transparent 44%),
        var(--bg);
      color: var(--text);
    }

    header {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 18px clamp(18px, 4vw, 44px);
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 3;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mark {
      width: 42px;
      height: 42px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      font-weight: 800;
      flex: 0 0 auto;
    }

    h1 {
      font-size: clamp(1.15rem, 2.5vw, 1.65rem);
      margin: 0;
      line-height: 1.1;
      font-weight: 800;
    }

    .subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      background: white;
      color: var(--muted);
      font-size: 0.86rem;
      white-space: nowrap;
    }

    .pill.ok {
      color: #0d6c54;
      border-color: rgba(29, 143, 115, 0.35);
      background: rgba(29, 143, 115, 0.09);
    }

    .pill.bad {
      color: var(--danger);
      border-color: rgba(179, 59, 52, 0.32);
      background: rgba(179, 59, 52, 0.08);
    }

    .button {
      min-height: 40px;
      border: 0;
      border-radius: 8px;
      padding: 0 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font: inherit;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      color: white;
      background: var(--panel-strong);
    }

    .button.secondary {
      color: var(--panel-strong);
      background: white;
      border: 1px solid var(--line);
    }

    main {
      display: grid;
      grid-template-columns: minmax(280px, 390px) minmax(0, 1fr);
      gap: 20px;
      padding: clamp(18px, 4vw, 44px);
      max-width: 1220px;
      margin: 0 auto;
      width: 100%;
    }

    section {
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .section-head {
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    h2 {
      margin: 0;
      font-size: 1rem;
      line-height: 1.25;
    }

    .count {
      font-size: 0.84rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .client-list {
      display: grid;
      gap: 8px;
      padding: 12px;
      max-height: calc(100vh - 190px);
      overflow: auto;
    }

    .client-button {
      width: 100%;
      border: 1px solid transparent;
      background: transparent;
      color: inherit;
      border-radius: 8px;
      padding: 12px;
      display: grid;
      grid-template-columns: 40px 1fr;
      gap: 12px;
      text-align: left;
      cursor: pointer;
    }

    .client-button:hover,
    .client-button.active {
      background: #f2eee5;
      border-color: #d9cdb8;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: white;
      background: var(--accent);
      font-weight: 800;
    }

    .client-name {
      font-weight: 800;
      min-width: 0;
    }

    .client-meta {
      margin-top: 3px;
      color: var(--muted);
      font-size: 0.84rem;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .workspace {
      display: grid;
      gap: 20px;
    }

    .service {
      padding: 22px;
      display: grid;
      gap: 18px;
    }

    .selected {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: start;
    }

    .dialogue {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .badge {
      border-radius: 999px;
      background: rgba(211, 106, 45, 0.12);
      color: #9b4314;
      padding: 8px 12px;
      font-weight: 800;
      font-size: 0.82rem;
      white-space: nowrap;
    }

    .dosages {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 12px;
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 700;
    }

    input {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 11px;
      font: inherit;
      color: var(--text);
      background: white;
    }

    input:focus {
      outline: 3px solid rgba(29, 143, 115, 0.16);
      border-color: rgba(29, 143, 115, 0.7);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .result {
      display: grid;
      grid-template-columns: 120px minmax(0, 1fr);
      gap: 16px;
      border-top: 1px solid var(--line);
      padding-top: 18px;
      min-height: 96px;
    }

    .score {
      border-radius: 8px;
      min-height: 82px;
      display: grid;
      place-items: center;
      background: var(--panel-strong);
      color: white;
      font-size: 2rem;
      font-weight: 900;
    }

    .feedback {
      margin: 0;
      color: var(--text);
      line-height: 1.5;
      align-self: center;
    }

    .diffs {
      color: var(--muted);
      font-size: 0.86rem;
      margin-top: 8px;
    }

    .empty {
      padding: 18px;
      color: var(--muted);
    }

    @media (max-width: 820px) {
      header {
        align-items: flex-start;
        flex-direction: column;
      }

      .header-actions {
        width: 100%;
        justify-content: flex-start;
      }

      main {
        grid-template-columns: 1fr;
      }

      .client-list {
        max-height: 310px;
      }

      .selected,
      .result {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <div class="mark">TP</div>
      <div>
        <h1>Ti Punch Master</h1>
        <p class="subtitle">Frontend 3016 - API 8016</p>
      </div>
    </div>
    <div class="header-actions">
      <span class="pill" id="apiStatus">API...</span>
      <a class="button secondary" href="http://127.0.0.1:8016/docs" target="_blank" rel="noreferrer">Docs API</a>
    </div>
  </header>

  <main>
    <section>
      <div class="section-head">
        <h2>Clients</h2>
        <span class="count" id="clientCount">0</span>
      </div>
      <div class="client-list" id="clientList">
        <div class="empty">Chargement...</div>
      </div>
    </section>

    <div class="workspace">
      <section class="service">
        <div class="selected">
          <div>
            <h2 id="selectedName">Service</h2>
            <p class="dialogue" id="selectedDialogue"></p>
          </div>
          <span class="badge" id="selectedCocktail">Cocktail</span>
        </div>

        <div class="dosages" id="dosages"></div>

        <div class="actions">
          <button class="button" id="serveButton" type="button">Servir</button>
          <button class="button secondary" id="perfectButton" type="button">Dosage parfait</button>
        </div>

        <div class="result">
          <div class="score" id="score">--</div>
          <div>
            <p class="feedback" id="feedback">Selectionne un client pour tester le score.</p>
            <div class="diffs" id="diffs"></div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const API_BASE = "http://127.0.0.1:8016";

    const state = {
      clients: [],
      selected: null
    };

    const els = {
      apiStatus: document.getElementById("apiStatus"),
      clientList: document.getElementById("clientList"),
      clientCount: document.getElementById("clientCount"),
      selectedName: document.getElementById("selectedName"),
      selectedDialogue: document.getElementById("selectedDialogue"),
      selectedCocktail: document.getElementById("selectedCocktail"),
      dosages: document.getElementById("dosages"),
      serveButton: document.getElementById("serveButton"),
      perfectButton: document.getElementById("perfectButton"),
      score: document.getElementById("score"),
      feedback: document.getElementById("feedback"),
      diffs: document.getElementById("diffs")
    };

    function setApiStatus(ok, text) {
      els.apiStatus.textContent = text;
      els.apiStatus.classList.toggle("ok", ok);
      els.apiStatus.classList.toggle("bad", !ok);
    }

    function currentRecipe() {
      if (!state.selected) return null;
      return state.selected.recipes[state.selected.cocktail];
    }

    function formatName(value) {
      return value.replace(/_/g, " ").replace(/\b\w/g, letter => letter.toUpperCase());
    }

    function renderClients() {
      els.clientCount.textContent = `${state.clients.length} clients`;
      els.clientList.innerHTML = "";

      state.clients.forEach(client => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "client-button";
        button.classList.toggle("active", state.selected && client.id === state.selected.id);
        button.addEventListener("click", () => selectClient(client.id));

        const avatar = document.createElement("div");
        avatar.className = "avatar";
        avatar.textContent = client.name.slice(0, 1).toUpperCase();

        const content = document.createElement("div");
        const name = document.createElement("div");
        name.className = "client-name";
        name.textContent = client.name;

        const meta = document.createElement("div");
        meta.className = "client-meta";
        meta.textContent = `${formatName(client.cocktail)} - ${client.difficulty}`;

        content.append(name, meta);
        button.append(avatar, content);
        els.clientList.append(button);
      });
    }

    function renderSelected() {
      const client = state.selected;
      const recipe = currentRecipe();

      if (!client || !recipe) return;

      els.selectedName.textContent = client.name;
      els.selectedDialogue.textContent = client.dialogue;
      els.selectedCocktail.textContent = formatName(client.cocktail);
      els.dosages.innerHTML = "";
      els.score.textContent = "--";
      els.feedback.textContent = "Pret pour le service.";
      els.diffs.textContent = "";

      Object.entries(recipe.target).forEach(([ingredient, target]) => {
        const label = document.createElement("label");
        label.textContent = `${formatName(ingredient)} (${target} cl)`;

        const input = document.createElement("input");
        input.type = "number";
        input.min = "0";
        input.max = "12";
        input.step = "0.5";
        input.value = target;
        input.dataset.ingredient = ingredient;

        label.append(input);
        els.dosages.append(label);
      });
    }

    function selectClient(id) {
      state.selected = state.clients.find(client => client.id === id) || state.clients[0];
      renderClients();
      renderSelected();
    }

    function readDosages() {
      const dosages = {};
      els.dosages.querySelectorAll("input").forEach(input => {
        dosages[input.dataset.ingredient] = Number(input.value || 0);
      });
      return dosages;
    }

    async function serve() {
      if (!state.selected) return;

      els.serveButton.disabled = true;
      els.feedback.textContent = "Calcul...";

      try {
        const response = await fetch(`${API_BASE}/score`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            client_id: state.selected.id,
            cocktail: state.selected.cocktail,
            dosages: readDosages()
          })
        });

        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const result = await response.json();
        els.score.textContent = result.score;
        els.feedback.textContent = result.feedback;
        els.diffs.textContent = Object.entries(result.diffs)
          .map(([ingredient, diff]) => `${formatName(ingredient)}: ${diff} cl`)
          .join(" | ");
      } catch (error) {
        els.score.textContent = "!";
        els.feedback.textContent = "Impossible de calculer le score.";
        els.diffs.textContent = error.message;
      } finally {
        els.serveButton.disabled = false;
      }
    }

    function fillPerfectDosage() {
      const recipe = currentRecipe();
      if (!recipe) return;

      els.dosages.querySelectorAll("input").forEach(input => {
        input.value = recipe.target[input.dataset.ingredient];
      });
    }

    async function boot() {
      try {
        const root = await fetch(`${API_BASE}/`);
        if (!root.ok) throw new Error(`HTTP ${root.status}`);
        setApiStatus(true, "API 8016 active");

        const response = await fetch(`${API_BASE}/clients`);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        state.clients = data.clients || [];

        if (!state.clients.length) {
          els.clientList.innerHTML = '<div class="empty">Aucun client.</div>';
          return;
        }

        state.selected = state.clients[0];
        renderClients();
        renderSelected();
      } catch (error) {
        setApiStatus(false, "API 8016 indisponible");
        els.clientList.innerHTML = '<div class="empty">Backend non joignable.</div>';
        els.feedback.textContent = error.message;
      }
    }

    els.serveButton.addEventListener("click", serve);
    els.perfectButton.addEventListener("click", fillPerfectDosage);

    boot();
  </script>
</body>
</html>
