services:
  api:
    build: .
    container_name: karib-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - karib-network

  db:
    image: pgvector/pgvector:pg16
    container_name: karib-postgres
    environment:
      POSTGRES_USER: karib
      POSTGRES_PASSWORD: karib_pass
      POSTGRES_DB: karibmarket
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U karib -d karibmarket" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - karib-network

  redis:
    image: redis:7-alpine
    container_name: karib-redis
    ports:
      - "6379:6379"
    networks:
      - karib-network

networks:
  karib-network:
    driver: bridge

volumes:
  postgres_data:
