
services:
  postgres:
    image: postgres:15
    container_name: karib-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: karib
      POSTGRES_PASSWORD: karib_pass
      POSTGRES_DB: karibmarket
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U karib -d karibmarket"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: